<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stock Ledger — Clothing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  :root {
    --bg: #12100e;
    --panel: #1a1714;
    --panel-2: #211d19;
    --line: #322c26;
    --rust: #c1652f;
    --rust-soft: #8a4a24;
    --sage: #8a9a7e;
    --sage-soft: #5f6b56;
    --text: #f1ede7;
    --text-dim: #a89f92;
    --text-faint: #6b6357;
    --danger: #b45d54;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body { min-height: 100vh; padding-bottom: 40px; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .display { font-family: 'Fraunces', serif; }

  header {
    padding: 28px 20px 22px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: "";
    position: absolute;
    top: -60%; left: 50%;
    width: 420px; height: 420px;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(193,101,47,0.10), transparent 65%);
    pointer-events: none;
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1.display {
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 18px;
    color: var(--text);
  }

  .summary-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .summary-card {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 12px;
    border-top: 2px solid var(--rust);
    position: relative;
    z-index: 1;
  }
  .summary-card:nth-child(2) { border-top-color: var(--sage); }
  .summary-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .summary-value {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .summary-card:first-child .summary-value { color: var(--rust); }
  .summary-card:nth-child(2) .summary-value { color: var(--sage); }
  .summary-unit { font-size: 12px; color: var(--text-dim); margin-left: 3px; }

  .value-row {
    margin-top: 16px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .value-row .label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .value-row .amount { font-size: 20px; font-weight: 600; color: var(--text); }

  .backup-bar { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .backup-btn {
    flex: 1; min-width: 90px;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px; font-weight: 600;
    padding: 10px 8px; border-radius: 10px;
    cursor: pointer; text-align: center;
    transition: all 0.15s ease;
  }
  .backup-btn:active { transform: scale(0.97); background: var(--panel-2); }

  .section { padding: 22px 20px 4px; }
  .section-title {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; color: var(--text-dim); }
  .field input, .field select {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'IBM Plex Mono', monospace;
    width: 100%;
  }
  .field select { font-family: 'Manrope', sans-serif; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--rust-soft); }

  .add-form {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 22px;
  }
  .add-form .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .add-form .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .btn-primary {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #c1652f, #96501f);
    color: #16110c;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .btn-primary:active { transform: scale(0.98); }

  .item-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--rust);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 15px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-meta {
    font-size: 12px; color: var(--text-faint); margin-top: 3px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .item-qty {
    font-size: 17px; font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--rust);
    white-space: nowrap;
    min-width: 34px;
    text-align: center;
  }
  .item-unit { font-size: 11px; color: var(--text-faint); margin-left: 2px; }
  .qty-stepper {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 4px;
  }
  .step-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: none;
    background: var(--panel);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }
  .step-btn:active { transform: scale(0.92); background: var(--rust-soft); }
  .step-btn.minus:active { background: var(--danger); }
  .del-btn {
    background: none; border: none; color: var(--text-faint);
    font-size: 18px; padding: 4px 6px; cursor: pointer; line-height: 1;
  }
  .del-btn:active { color: var(--danger); }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--text-faint); font-size: 13px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 18px; border-radius: 30px; font-size: 13px;
    opacity: 0; transition: all 0.25s ease; pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- PRICE SCANNER ---------- */
  .scanner-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 22px;
  }
  .scanner-viewport {
    position: relative;
    width: 100%;
    height: 0;
    border-radius: 10px;
    overflow: hidden;
    background: #000;
    margin-bottom: 12px;
    transition: height 0.2s ease;
  }
  .scanner-viewport.active { height: 220px; }
  .scanner-viewport video, .scanner-viewport canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .manual-row { display: flex; gap: 8px; margin-top: 12px; }
  .manual-row input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .manual-row input:focus { outline: none; border-color: var(--rust-soft); }
  .manual-row .backup-btn { flex: 0 0 auto; min-width: 76px; }

  #scanResult { margin-top: 14px; }
  .scan-match {
    background: var(--panel-2);
    border: 1px solid var(--sage-soft);
    border-left: 3px solid var(--sage);
    border-radius: 12px;
    padding: 14px;
  }
  .scan-price { font-size: 22px; font-weight: 700; color: var(--sage); font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }
  .scan-nomatch {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-left: 3px solid var(--danger);
    border-radius: 12px;
    padding: 14px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .scan-nomatch select {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 8px;
    padding: 8px;
    font-size: 13px;
    margin-top: 6px;
    width: 100%;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Personal Ledger</div>
  <h1 class="display">Clothing Stock</h1>

  <div class="summary-row">
    <div class="summary-card">
      <div class="summary-label">Total Items</div>
      <div class="summary-value mono"><span id="totalItems">0</span></div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Total Quantity</div>
      <div class="summary-value mono"><span id="totalQty">0</span><span class="summary-unit">pcs</span></div>
    </div>
  </div>

  <div class="value-row">
    <span class="label">Total stock value</span>
    <span class="amount mono">₹<span id="totalValue">0</span></span>
  </div>

  <div class="value-row" style="margin-top: 6px;">
    <span class="label">Total sales (revenue)</span>
    <span class="amount mono" style="color: var(--sage);">₹<span id="totalSales">0</span></span>
  </div>

  <div class="backup-bar">
    <button class="backup-btn" onclick="saveNow()">💾 Save</button>
    <button class="backup-btn" onclick="exportBackup()">⬇️ Backup file</button>
    <button class="backup-btn" onclick="document.getElementById('importFile').click()">⬆️ Restore</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)" />
  </div>
</header>

<div class="section">
  <div class="section-title">📷 Price Scanner</div>
  <div class="scanner-box">
    <div class="scanner-viewport" id="scannerViewport"></div>
    <button class="btn-primary" id="scanToggleBtn" onclick="toggleScanner()">📷 Scan Barcode Start Karein</button>
    <div class="manual-row">
      <input type="text" id="manualBarcode" placeholder="Ya barcode number type karein" inputmode="numeric" />
      <button class="backup-btn" onclick="lookupManualBarcode()">Dhoondo</button>
    </div>
    <div id="scanResult"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Naya item add karein</div>
  <div class="add-form">
    <div class="row2">
      <div class="field">
        <label>Item ka naam</label>
        <input type="text" id="itemName" placeholder="e.g. Kurta, Shirt, Jeans" />
      </div>
      <div class="field">
        <label>Category</label>
        <input type="text" id="itemCategory" placeholder="e.g. Men / Women / Kids" />
      </div>
    </div>
    <div class="row3">
      <div class="field">
        <label>Size</label>
        <input type="text" id="itemSize" placeholder="S/M/L/XL" />
      </div>
      <div class="field">
        <label>Color</label>
        <input type="text" id="itemColor" placeholder="e.g. Blue" />
      </div>
      <div class="field">
        <label>Quantity</label>
        <input type="number" inputmode="numeric" id="itemQty" placeholder="0" />
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Price per piece (₹)</label>
        <input type="number" inputmode="decimal" id="itemPrice" placeholder="0" />
      </div>
      <div class="field">
        <label>Note (optional)</label>
        <input type="text" id="itemNote" placeholder="e.g. Rack 3" />
      </div>
    </div>
    <div class="field" style="margin-bottom: 10px;">
      <label>Barcode (optional — scan karke bhi jod sakte ho)</label>
      <input type="text" id="itemBarcode" placeholder="Barcode number" inputmode="numeric" />
    </div>
    <button class="btn-primary" onclick="addItem()">+ Stock mein add karein</button>
  </div>
</div>

<div class="section">
  <div class="section-title">
    <span>Stock List</span>
    <span class="mono" id="listCount" style="color: var(--text-dim); font-size: 11px;"></span>
  </div>
  <div id="itemList">
    <div class="empty-state">Loading...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = [];
let salesLog = [];
const STORAGE_KEY = 'clothing-stock-items';
const SALES_KEY = 'clothing-sales-log';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

async function loadData() {
  try {
    const res = await window.storage.get(STORAGE_KEY, true);
    items = res ? JSON.parse(res.value) : [];
  } catch (e) {
    items = [];
  }
  try {
    const res = await window.storage.get(SALES_KEY, true);
    salesLog = res ? JSON.parse(res.value) : [];
  } catch (e) {
    salesLog = [];
  }
  render();
}

async function saveItems() {
  try {
    const res = await window.storage.set(STORAGE_KEY, JSON.stringify(items), true);
    if (!res) showToast('Save nahi ho paya, dobara try karein');
  } catch (e) {
    showToast('Save nahi ho paya, dobara try karein');
  }
}

async function saveSales() {
  try {
    await window.storage.set(SALES_KEY, JSON.stringify(salesLog), true);
  } catch (e) { /* ignore */ }
}

async function saveNow() {
  await saveItems();
  await saveSales();
  showToast('✅ Saved — har jagah sync ho gaya!');
}

function exportBackup() {
  const backup = { items: items, salesLog: salesLog, exportedOn: new Date().toLocaleString('en-IN') };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'clothing-stock-backup-' + dateStr + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('⬇️ Backup file download ho gayi');
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.items && Array.isArray(data.items)) {
        items = data.items;
        await saveItems();
      }
      if (data.salesLog && Array.isArray(data.salesLog)) {
        salesLog = data.salesLog;
        await saveSales();
      }
      render();
      showToast('⬆️ Restore ho gaya ✓');
    } catch (err) {
      showToast('Ye backup file sahi nahi hai');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

async function addItem() {
  const name = document.getElementById('itemName').value.trim();
  const category = document.getElementById('itemCategory').value.trim();
  const size = document.getElementById('itemSize').value.trim();
  const color = document.getElementById('itemColor').value.trim();
  const qty = parseInt(document.getElementById('itemQty').value);
  const price = parseFloat(document.getElementById('itemPrice').value) || 0;
  const note = document.getElementById('itemNote').value.trim();
  const barcode = document.getElementById('itemBarcode').value.trim();

  if (!name) { showToast('Item ka naam daalein'); return; }
  if (!qty || qty <= 0) { showToast('Sahi quantity daalein'); return; }

  const item = {
    id: Date.now().toString(),
    name, category, size, color, qty, price, note, barcode,
    date: new Date().toLocaleDateString('en-IN')
  };
  items.unshift(item);
  await saveItems();

  document.getElementById('itemName').value = '';
  document.getElementById('itemCategory').value = '';
  document.getElementById('itemSize').value = '';
  document.getElementById('itemColor').value = '';
  document.getElementById('itemQty').value = '';
  document.getElementById('itemPrice').value = '';
  document.getElementById('itemNote').value = '';
  document.getElementById('itemBarcode').value = '';

  showToast('Stock add ho gaya ✓');
  render();
}

async function adjustQty(id, delta) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const newQty = (item.qty || 0) + delta;
  if (newQty < 0) return;
  item.qty = newQty;
  await saveItems();

  if (delta < 0) {
    salesLog.push({
      id: Date.now().toString(),
      itemName: item.name,
      qty: 1,
      price: item.price || 0,
      revenue: item.price || 0,
      date: new Date().toLocaleDateString('en-IN'),
      time: new Date().toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'})
    });
    await saveSales();
    showToast('🛍️ Sold 1 — stock update ho gaya');
  }

  render();
}

async function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  await saveItems();
  render();
  showToast('Item hata diya gaya');
}

/* ---------- PRICE SCANNER ---------- */
let scannerActive = false;
let lastScanTime = 0;

function toggleScanner() {
  if (scannerActive) { stopScanner(); return; }

  if (typeof Quagga === 'undefined') {
    showToast('Scanner load nahi ho paya, manually barcode daalein');
    return;
  }

  const viewport = document.getElementById('scannerViewport');
  const btn = document.getElementById('scanToggleBtn');
  viewport.classList.add('active');
  btn.textContent = '⏳ Camera khul raha hai...';

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: viewport,
      constraints: { facingMode: "environment" }
    },
    decoder: {
      readers: ["ean_reader", "ean_8_reader", "upc_reader", "upc_e_reader", "code_128_reader"]
    },
    locate: true
  }, function (err) {
    if (err) {
      showToast('Camera access nahi mila — manually barcode daalein');
      viewport.classList.remove('active');
      btn.textContent = '📷 Scan Barcode Start Karein';
      return;
    }
    Quagga.start();
    scannerActive = true;
    btn.textContent = '⏹ Scanner Band Karein';
  });

  Quagga.onDetected(onBarcodeDetected);
}

function stopScanner() {
  try { Quagga.offDetected(onBarcodeDetected); Quagga.stop(); } catch (e) { /* ignore */ }
  scannerActive = false;
  const viewport = document.getElementById('scannerViewport');
  viewport.classList.remove('active');
  viewport.innerHTML = '';
  document.getElementById('scanToggleBtn').textContent = '📷 Scan Barcode Start Karein';
}

function onBarcodeDetected(result) {
  const now = Date.now();
  if (now - lastScanTime < 1500) return;
  lastScanTime = now;
  const code = result.codeResult.code;
  if (navigator.vibrate) navigator.vibrate(80);
  lookupBarcode(code);
}

function lookupManualBarcode() {
  const code = document.getElementById('manualBarcode').value.trim();
  if (!code) { showToast('Barcode number daalein'); return; }
  lookupBarcode(code);
}

function lookupBarcode(code) {
  const item = items.find(i => i.barcode === code);
  const resEl = document.getElementById('scanResult');

  if (item) {
    resEl.innerHTML = `
      <div class="scan-match">
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-meta">${[item.category, item.size, item.color].filter(Boolean).map(escapeHtml).join(' · ')}</div>
        <div class="scan-price">₹${item.price}<span style="font-size:12px; color:var(--text-faint); font-weight:400;"> · Stock: ${item.qty} pcs</span></div>
        <button class="btn-primary" style="margin-top:10px;" onclick="sellScanned('${item.id}')">🛍️ 1 Piece Bill Karein</button>
      </div>`;
  } else if (items.length) {
    const options = items.map(i =>
      `<option value="${i.id}">${escapeHtml(i.name)}${[i.size, i.color].filter(Boolean).length ? ' (' + [i.size, i.color].filter(Boolean).map(escapeHtml).join(' ') + ')' : ''}</option>`
    ).join('');
    resEl.innerHTML = `
      <div class="scan-nomatch">
        Is barcode (<span class="mono">${escapeHtml(code)}</span>) se koi item match nahi hua.<br>
        Kisi existing item se jodna hai to chuno:
        <select id="linkItemSelect">${options}</select>
        <button class="backup-btn" style="margin-top:8px; width:100%;" onclick="linkBarcode('${code.replace(/'/g, "\\'")}')">Jodo</button>
      </div>`;
  } else {
    resEl.innerHTML = `<div class="scan-nomatch">Is barcode se koi item match nahi hua. Pehle upar se koi item add karein.</div>`;
  }
}

async function linkBarcode(code) {
  const id = document.getElementById('linkItemSelect').value;
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.barcode = code;
  await saveItems();
  showToast('Barcode jod diya gaya ✓');
  lookupBarcode(code);
}

async function sellScanned(id) {
  await adjustQty(id, -1);
  const item = items.find(i => i.id === id);
  if (item) lookupBarcode(item.barcode);
}

function render() {
  const totalItems = items.length;
  const totalQty = items.reduce((s, i) => s + (i.qty || 0), 0);
  const totalValue = items.reduce((s, i) => s + ((i.qty || 0) * (i.price || 0)), 0);
  const totalSales = salesLog.reduce((s, l) => s + (l.revenue || 0), 0);

  document.getElementById('totalItems').textContent = totalItems;
  document.getElementById('totalQty').textContent = totalQty;
  document.getElementById('totalValue').textContent = totalValue.toLocaleString('en-IN', {maximumFractionDigits: 0});
  document.getElementById('totalSales').textContent = totalSales.toLocaleString('en-IN', {maximumFractionDigits: 0});
  document.getElementById('listCount').textContent = totalItems + ' entries';

  const listEl = document.getElementById('itemList');
  if (items.length === 0) {
    listEl.innerHTML = '<div class="empty-state">Abhi tak koi stock add nahi kiya gaya.<br>Upar form se apna pehla item add karein.</div>';
    return;
  }

  listEl.innerHTML = items.map(item => `
    <div class="item-card">
      <div class="item-info">
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-meta">${[item.category, item.size, item.color].filter(Boolean).map(escapeHtml).join(' · ')}${item.note ? ' · ' + escapeHtml(item.note) : ''}${item.barcode ? ' · #' + escapeHtml(item.barcode) : ''} · ${item.date}</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="qty-stepper">
          <button class="step-btn minus" onclick="adjustQty('${item.id}', -1)">−</button>
          <div class="item-qty">${item.qty}</div>
          <button class="step-btn" onclick="adjustQty('${item.id}', 1)">+</button>
        </div>
        <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadData();
</script>

</body>
</html>
